name: Skill improvement
description: Suggest a new example, reference, rule, or eval case.
title: "[Improvement]: "
labels:
  - enhancement
body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be added or changed?
      placeholder: Add guidance for...
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why it helps
      description: What agent mistake or user workflow would this improve?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - SKILL.md
        - Accessibility reference
        - Next.js reference
        - Icon prefixes reference
        - Migration examples
        - Evals
        - README or repo docs
    validations:
      required: true
